            try {
                // Using the CORS proxy to prevent the error you had earlier
                const response = await fetch('https://corsproxy.io/?https://zenquotes.io/api/random');
                const data = await response.json();
                document.getElementById('quote-text').innerText = `"${data[0].q}"`;
                document.getElementById('quote-author').innerText = `- ${data[0].a}`;
            } catch (err) {
                document.getElementById('quote-text').innerText = "The only way to do great work is to love what you do.";
                document.getElementById('quote-author').innerText = "- Steve Jobs";
            }
        }

          progressContainer.innerHTML = members.map(member => `

              <div class="information flex flex-col md:flex-row justify-between p-2 gap-4 md:gap-10">

                  <img class="max-w-40 h-auto rounded-2xl sm:max-w-100" src="${member.portrait}" alt="${member.name}">
                </div>

                <div class="description flex flex-col gap-2">
                  <div class="bodyInfo text-center"><h1>${member.stats}</h1></div>
                  <h1 class="goal">Goal: ${member.goal}</h1>
                  <h1 class="progress-status">Current: ${member.progress}</h1>
                  
                  <div class="fitt flex flex-col justify-center items-center gap-2">
                    <h1 class="text-center">FITT Plan</h1>
                    <img class="max-w-60 sm:max-w-100" src="${member.fittImage}" alt="FITT Plan">

                        alt="Proof"
                        onclick="openModal('${img}')"

            </div>
